app:
  name: mongomobileappdb
  code: MONGOMOBILEAPPDB
  notify: appz@cloudbourne.co

build:
  version: 8.2
  env: DEV
  build_file: none
  output_files: output/*.zip
  image_template: mongo-8.2

deploy:
  context: edavis043/DEV
  type: statefulset
  replicas: 2
  port:
  - 27017
  - 9216

volumes:
- claim: mongo-data
  mount: /appz/data
  name: mongo-data
  size: 5Gi
  mode: ReadWriteOnce

- claim: mongo-keys
  mount: /appz/keys
  name: mongo-keys
  size: 1Gi
  mode: ReadWriteOnce

- claim: mongo-backup
  mount: /appz/backup
  name: mongo-backup
  size: 5Gi
  mode: ReadWriteOnce 

properties:
  DB_USER_ADMIN: admin
  DB_USER_ADMIN_PASSWORD: 
    vault: DB_USER_ADMIN_PASSWORD
  MONGO_USER_PASSWORD: 
    vault: MONGO_USER_PASSWORD
  AUTH_KEY: 
    vault: AUTH_KEY
  ENCRYPTION_KEY:
    vault: ENCRYPTION_KEY
  #AWS_DEFAULT_REGION: ap-south-1
  #BACKUPFILE: "*"
  REPLICATION: 2
  MASTER_ENABLE: "no"
  AUTH_ENABLE: 1
  #S3_BUCKET: mongodbstorage
  MONGODB_HOST: 127.0.0.1
  MONGODB_PORT: 27017
  MONGO_BACKUP_TIME: 2
  MONGO_BACKUP_DAYS: 7
  revision : 0
